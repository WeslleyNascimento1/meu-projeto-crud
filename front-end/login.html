<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>MercadoApp</h1>
            <p>Gestão de Estoque</p>
        </header>
        <p id="versao">v1.0 - Sistema interno</p>

        <h2>Bem-vindo de volta</h2>
        <p>Faça login para acessar seu estoque</p>

        <form action="/criar">
            <label for="email">E-MAIL</label>
            <input type="email" placeholder="admin@mercado.com">
            <label for="senha">SENHA</label>
            <input type="password" placeholder="******">
        </form>

        <p><a href="#">Esqueceu a senha?</a></p>

        <button id="botao"><a href="#">Entrar no sistema</a></button>
    </main>

</body>
</html>
