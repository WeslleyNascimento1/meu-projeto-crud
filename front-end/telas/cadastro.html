<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MercadoApp</title>
    <link rel="stylesheet" href="..\estilos/cadastro.css">
</head>
<body>
    <main>
        <div class="container">
            <img class="imagemCarrinho" src="..\imagens/bolsa-de-compras.png" alt="Sacola de compras">
            <div class="textos">
                <h1 class="titulo">MercadoApp</h1>
                <p class="subtitulo">Gestão de Estoque</p>
            </div>
        </div>
        
        <div id="criarConta">
            <h2>Criar conta</h2>
            <p>Preencha seus dados para acessar o sistema</p>
        </div>

        <div id="formulario">
            <form action="">
                <div class="nome-container">
                    <div class="campo-nome">
                        <label for="nome">NOME</label>
                        <input type="text" name="nome" id="nome" placeholder="Weslley">
                    </div>
                    <div class="campo-sobrenome">
                        <label for="sobrenome">SOBRENOME</label>
                        <input type="text" name="sobrenome" id="sobrenome" placeholder="Bezerra">
                    </div>
                </div>

                <label for="email">E-MAIL</label>
                <input type="email" name="email" id="email" placeholder="seu@email.com">

                <label for="telefone">TELEFONE</label>
                <input type="tel" name="telefone" id="telefone" placeholder="(85) 9 0000-0000">

                <label for="perfis">PERFIL DE ACESSO</label>
                <select name="perfis" id="perfis">
                    <option value="" selected>Selecione um perfil</option>
                    <option value="">Administrador &mdash; acesso total</option>
                    <option value="">Gerente &mdash; sem exclusão</option>
                    <option value="">Operador &mdash; somente leitura e entrada</option>
                </select>
                <p>Define o que o usuário pode fazer no sistema</p>

                <label for="senha">SENHA</label>
                <input type="password" placeholder="********">
                
                <label for="senha">CONFIRMAR SENHA</label>
                <input type="password" placeholder="********">

                <div class="termos-container">
                    <input type="checkbox" class="caixa" id="aceito-termos">
                    <div class="termos">
                        <p>Concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a> do MercadoApp</p>
                    </div>
                </div>

                <button>Criar minha conta</button>

            </form>
        </div>

        <div class="linhas">
            <hr>
            <p>já tem conta?</p>
            <hr>
        </div>

        <a href="login.html" id="voltar">&larr; Voltar ao login</a>

    </main>
</body>
</html>
