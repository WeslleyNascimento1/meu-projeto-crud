<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MercadoApp</title>
    <link rel="stylesheet" href="..\estilos/cadastro.css">
</head>
<body>
    <main>
        <div class="container">
            <img class="imagemCarrinho" src="..\imagens/bolsa-de-compras.png" alt="Sacola de compras">
            <div class="textos">
                <h1 class="titulo">MercadoApp</h1>
                <p class="subtitulo">Gestão de Estoque</p>
            </div>
        </div>
        
        <div id="criarConta">
            <h2>Criar conta</h2>
            <p>Preencha seus dados para acessar o sistema</p>
        </div>

        <div id="formulario">
            <form action="">
                <label for="name">NOME</label>
                <input type="text" name="nome" id="nome" placeholder="Weslley">

                <label for="lastname">SOBRENOME</label>
                <input type="text" name="nome" id="nome" placeholder="Bezerra">

                <label for="email">E-MAIL</label>
                <input type="email" name="email" id="email">

                <label for="telefone">TELEFONE</label>
                <input type="tel" name="telefone" id="telefone">

                <select name="perfis" id="perfis">
                    <option value="" selected>Selecione um perfil</option>
                    <option value="">Administrador - acesso total</option>
                    <option value="">Gerente - sem exclusão</option>
                    <option value="">Operador - somente leitura e entrada</option>
                </select>
                <p>Define o que o usuário pode fazer no sistema</p>

                <label for="senha">SENHA</label>
                <input type="password">
                
                <label for="senha">CONFIRMAR SENHA</label>
                <input type="password">

                <input type="checkbox" class="caixa">
                <p class="termos">Concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a> do MercadoApp</p>

                <button>Criar minha conta</button>

            </form>
        </div>

        <div class="linhas">
            <hr>
            <p>já tem conta?</p>
            <hr>
        </div>

        <a href="login.html"><- Voltar ao login</a>

    </main>
</body>
</html>
