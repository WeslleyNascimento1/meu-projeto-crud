<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MercadoApp</title>
    <link rel="stylesheet" href="..\estilos/cadastro.css">
</head>
<body>
    <main>
        <div class="container">
            <img class="imagemCarrinho" src="..\imagens/bolsa-de-compras.png" alt="Sacola de compras">
            <div class="textos">
                <h1 class="titulo">MercadoApp</h1>
                <p class="subtitulo">Gestão de Estoque</p>
            </div>
        </div>
        
        <div>
            <h2>Criar conta</h2>
            <p>Preencha seus dados para acessar o sistema</p>
        </div>

        <div>
            <form action="">
                <label for="name">NOME</label>
                <input type="text" name="nome" id="nome" placeholder="Weslley">

                <label for="lastname">SOBRENOME</label>
                <input type="text" name="nome" id="nome" placeholder="Bezerra">

                <label for="email">E-MAIL</label>
                <input type="email" name="email" id="email">

                <label for="telefone">TELEFONE</label>
                <input type="tel" name="telefone" id="telefone">

            </form>
        </div>

    </main>
</body>
</html>
