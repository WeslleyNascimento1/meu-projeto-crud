<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MercadoApp</title>
    <link rel="stylesheet" href="..\estilos/main.css">
    <link rel="stylesheet" href="..\estilos/login.css">
</head>
<body>
    <main>
        <div class="container">
            <img class="imagemCarrinho" src="..\imagens/bolsa-de-compras.png" alt="Sacola de compras">
            <div class="textos">
                <h1 class="titulo">MercadoApp</h1>
                <p class="subtitulo">Gestão de Estoque</p>
            </div>
        </div>

        <p id="versao">v1.0 &mdash; Sistema interno</p>

        <div id="entrar">
            <h2>Bem-vindo de volta</h2>
            <p>Faça login para acessar seu estoque</p>
        </div>

        <form action="/criar">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" name="email" placeholder="admin@mercado.com" required>
            <label for="senha">SENHA</label>
            <input type="password" id="senha" name="senha" placeholder="********" required>

            <p class="esqueceusenha"><a href="#">Esqueceu a senha?</a></p>

            <button type="submit">Entrar no sistema</button>
        </form>

       

        <div class="linhas">
            <hr>
            <p>OU</p>
            <hr>
        </div>

        <p class="links-footer">Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
    </main>

</body>
</html>
